services:
  kali-desktop:
    build:
      context: .
      dockerfile: Dockerfile
    image: kali-vnc:latest
    container_name: kali-desktop
    stdin_open: true
    tty: true
    ports:
      - "5900:5900"
      - "5901:5901"
    volumes:
      - kali-data:/root
    restart: unless-stopped

volumes:
  kali-data:
    driver: local
